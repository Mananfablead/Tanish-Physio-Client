# Nginx Configuration for Tanish Physio & Fitness
# Place this file at: /etc/nginx/sites-available/tanishphysiofitness.in
# Then enable with: ln -s /etc/nginx/sites-available/tanishphysiofitness.in /etc/nginx/sites-enabled/

server {
    # HTTP Server - Redirect all to HTTPS
    listen 80;
    listen [::]:80;
    server_name www.tanishphysiofitness.in tanishphysiofitness.in;
    
    # Force redirect all HTTP traffic to HTTPS
    return 301 https://tanishphysiofitness.in$request_uri;
}

server {
    # HTTPS Server
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tanishphysiofitness.in;
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/tanishphysiofitness.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tanishphysiofitness.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Root directory for built React app (Vite output)
    # Set this to the folder that contains index.html + assets/
    root /var/www/tanishphysiofitness.in/dist;
    index index.html;
    
    # MIME types configuration for proper content serving
    types {
        application/javascript js mjs;
        text/css css;
        text/html html htm;
        text/plain txt;
        application/json json;
        image/svg+xml svg svgz;
        application/wasm wasm;
    }
    default_type application/octet-stream;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://checkout.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.tanishphysiofitness.in wss://tanishphysiofitness.in;" always;
    
    # Gzip Compression - Optimized
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 6;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+ application/javascript application/json application/wasm;
    gzip_disable "MSIE [1-6]\.";
    
    # Browser Caching - Aggressive
    # Versioned assets (hashed filenames) - cache forever
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }
    
    # Fonts - long cache (1 year)
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
    
    # JS/CSS with content hash - 30 days
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
    
    # Module scripts (.mjs and bundled modules)
    location ~* \.mjs$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
    
    # Manifest and service worker - no cache
    location ~* \.(json|webmanifest|xml)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        access_log off;
    }
    
    # Optional: normalize multiple trailing slashes (SEO)
    rewrite ^(.+?)/+$ $1 permanent;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Redirect index.html to root (SEO Issue #7)
    location = /index.html {
        return 301 /;
    }
    
    # Proper 404 handling (SEO Issue #6)
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/tanishphysiofitness.in/dist;
        internal;
    }
    
    # Proxy API requests to Node.js backend
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }
    
    # WebSocket support for video calls
    location /socket.io/ {
        proxy_pass http://localhost:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# WWW to Non-WWW redirect (SEO Issue #5)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tanishphysiofitness.in;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/tanishphysiofitness.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tanishphysiofitness.in/privkey.pem;
    
    # Redirect www to non-www with 301
    return 301 https://tanishphysiofitness.in$request_uri;
}
